title: hook-test
# Engine fixture, not a playable game. `bun run play` skips this.
hidden: true
modules:
  - ./modules/tracker.ts
switches:
  cancelActions: false
  secretRevealed: false
variables:
  redirectScriptTo: { type: string, initial: "" }
  filterChoiceIdx: { type: number, initial: -1 }
  skipBeatIdx: { type: number, initial: -1 }
training:
  slotsPerDay: 2
  slotNames: [morning, night]
  startDay: 1
  maxDay: 5
  decayPerDay: 0
  decayStatId: ""
  sleepActionId: sleep
  huntActionId: ""
  stats:
    - { id: marker, name: marker, min: 0, max: 100, start: 0 }
  endConditions:
    - reason: marker hit
      when: { stat: { name: marker, min: 50 } }
      goto: end_marker
