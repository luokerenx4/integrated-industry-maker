description: |
  巻物が膝の前に置かれた瞬間のCG。任地の地図と、最初の一枚
  が記された札——黒沼地、江戸の南三里。札の表に朱で「初」
  の一字。主人公の手が札に伸びる、刀の柄頭が画面の右下に。
