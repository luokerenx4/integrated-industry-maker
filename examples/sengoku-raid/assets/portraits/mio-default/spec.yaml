prompt: |
  Anime-style half-body portrait of Mio, a young female shogunate
  inspector from the late Sengoku era. Indigo-black hair in an
  immaculate formal updo, not a strand out of place. Calm half-lidded
  deep indigo eyes. White kosode under a deep indigo uchikake
