kind: portrait
description: |
  澪（みお）の半身像。朝廷の監察役、白の小袖に深い藍の打掛、
  裾に水紋。きっちり結い上げた藍墨色の髪、伏し目がちの半眼。
  表情は動かない——感情は目の揺れにしか出ない。
