kind: sheet
description: |
  霞の総合キャラクターデザインシート（一枚絵）。全身正面・背面、
  頭部三角度、表情四種、弓矢と小物のディテール拡大を同一画面に
  収める。以降の分割シート・立绘・CG はすべてこの一枚を正とする。
  （外見の文字正典は characters/kasumi.md の「外見」節）
prompt: |
  Complete character design master sheet of Kasumi, a small young
  huntress from the late Sengoku era, everything on ONE sheet,
  model-sheet style with even lighting and a clean flat background:
  (a) full-body front view and back view, identical proportions;
  (b) a row of head studies — front, three-quarter, profile;
  (c) four small expression busts — neutral, easy smile, open laugh,
  puffed-cheek anger;
  (d) detail callouts — the longbow (full and grip close-up), quiver
  and arrows, young-grass-green arm/leg guards, waist pouch, sandals.
  Short windswept flaxen (light chestnut) hair, big round amber eyes,
  sun-tanned skin. Hemp-colored kosode and trousers. Sunlight-warm
  palette.
placeholder: "[霞・総合設定画] 一枚に全身・頭部三角度・表情・弓具詳細"
refs:
  characters: [kasumi]
size_hint:
  web: { aspect: "16:9" }
tags: [main-cast, design-sheet, master]
custom:
  template: character-master-sheet-v1
