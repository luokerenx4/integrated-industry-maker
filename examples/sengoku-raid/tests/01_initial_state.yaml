name: 開局：玩家在 hub 模式，weapon 装备好，flags 初始化正确
description: |
  Smoke test:
    - module's onSessionStart bootstraps player flags
    - weapon ancestor_yaodao auto-equipped at basePower=4
    - currentMapId starts at edo_castle (hub)
    - intro script auto-launches (becomes first non-hub Output)
inputs: []
assertions:
  - kind: state
    path: sengoku-raid.raid
    eq: null
  - kind: state
    path: baseline.currentMapId
    eq: edo_castle
  - kind: state
    path: baseline.equippedWeaponId
    eq: ancestor_yaodao
  - kind: state
    path: baseline.weapons.ancestor_yaodao.power
    eq: 4
  - kind: state
    path: baseline.characters.player.stats.hp
    eq: 30
  - kind: state
    path: baseline.characters.player.stats.spectral
    eq: 5
  - kind: state
    path: baseline.inventory.ryo
    eq: 100
  - kind: state
    path: baseline.currentScriptId
    eq: 000_intro
