name: 撤離成功：raid.pendingLoot 全部轉到 baseline.inventory、raidsCompleted +1
description: |
  Pre-seeds the player at shrine (extract zone, no encounter) with
  pendingLoot waiting to be cashed in. Dispatches raid:extract → mode
  flips to hub, loot lands in baseline.inventory.

state:
  baseline:
    completedScripts: [000_intro]
    currentMapId: kuro_swamp_shrine
    weapons:
      ancestor_yaodao: { power: 6 }
    characters:
      player:
        stats:
          hp: 25
          mental: 8
          spectral: 12
          intellect: 0
        custom: {}
    variables:
      raidsCompleted: 0
      raidsFailed: 0
  sengoku-raid:
    metCharacters: []
    raid:
      chain: kuro_swamp
      entryMapId: kuro_swamp_edge
      turnsTaken: 4
      pendingLoot:
        ryo: 25
        soul_shard: 2
      visited:
        kuro_swamp_shrine:
          visited: true
          searched: true
          encounter: null
          encounterCleared: false
          pendingLoot: {}
inputs:
  - { type: doActivity, id: "extract" }
  - { type: next }
  - { type: next }
assertions:
  - kind: state
    path: sengoku-raid.raid
    eq: null
  - kind: state
    path: baseline.currentMapId
    eq: edo_castle
  - kind: state
    path: baseline.variables.raidsCompleted
    eq: 1
  # Loot landed in stash.
  - kind: state
    path: baseline.inventory.soul_shard
    eq: 2
  # ryo: starts at 100 (onSessionStart bootstrap), +25 from extracted loot = 125.
  - kind: state
    path: baseline.inventory.ryo
    eq: 125
  # HP not restored (only failure resets HP — success keeps it).
  - kind: state
    path: baseline.characters.player.stats.hp
    eq: 25
