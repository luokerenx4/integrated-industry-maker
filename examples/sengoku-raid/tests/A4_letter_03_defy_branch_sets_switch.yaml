name: 提案A：letter_03 の三択で「公儀に刀を抜く」を選ぶと chose_court_defy が立つ
description: |
  Seed raidsCompleted=11, shogun_chapter=2, in raid at extract zone.
  Extract → trigger fires, letter_03 launches (fenced choice block).
  Pick option 1 (公儀に刀を抜く); the option's effects set
  chose_court_defy=true and goto end_defy. Verify the correct switch
  is set and the other two stay false.
state:
  baseline:
    completedScripts:
      - 000_intro
      - letter_01_suspicion
      - letter_02_rival
    weapons:
      ancestor_yaodao:
        power: 12
    characters:
      player:
        stats:
          hp: 30
          mental: 8
          spectral: 30
          intellect: 8
    variables:
      raidsCompleted: 11
      raidsFailed: 0
      shogun_chapter: 2
    currentMapId: kuro_swamp_shrine
  runtime:
    firedTriggers:
      - letter_01_dispatch
      - letter_02_dispatch
  sengoku-raid:
    metCharacters:
      - kagari
      - mio
    raid:
      chain: kuro_swamp
      entryMapId: kuro_swamp_edge
      turnsTaken: 1
      pendingLoot: {}
      visited:
        kuro_swamp_shrine:
          visited: true
          searched: true
          encounter: null
          encounterCleared: false
          pendingLoot: {}
maxSteps: 200
inputs:
  - type: doActivity
    id: extract
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: next
  - type: choose
    index: 1
  - type: next
  - type: next
  - type: next
  - type: next
assertions:
  - kind: state
    path: baseline.switches.chose_court_defy
    eq: true
  - kind: state
    path: baseline.switches.chose_court_loyal
    eq: false
  - kind: state
    path: baseline.switches.chose_court_silent
    eq: false
  - kind: state
    path: baseline.completedScripts
    includes: letter_03_choice
  - kind: state
    path: runtime.firedTriggers
    includes: letter_03_dispatch
