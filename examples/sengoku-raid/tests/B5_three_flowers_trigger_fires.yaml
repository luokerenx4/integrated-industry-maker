name: 提案B：composite switch trigger — 三人とも befriended で三花の盟が起動
description: |
  Seed two of three befriended switches already true; on the third
  invite-and-extract loop the trigger fires (rising edge of the `all`
  composite). We seed even simpler: set all three switches true on
  load, then enter hub. The trigger should fire from checkTriggers at
  startup. currentScriptId becomes three_flowers_alliance.
state:
  baseline:
    completedScripts:
      - 000_intro
      - letter_01_suspicion
      - letter_02_rival
    switches:
      befriended_kagari: true
      befriended_kasumi: true
      befriended_mio: true
    variables:
      raidsCompleted: 6
      shogun_chapter: 1
  runtime:
    firedTriggers:
      - letter_01_dispatch
  sengoku-raid:
    metCharacters:
      - kagari
      - kasumi
      - mio
    companion: null
    companionHp: 0
    raid: null
inputs: []
assertions:
  - kind: state
    path: baseline.currentScriptId
    eq: three_flowers_alliance
  - kind: state
    path: runtime.firedTriggers
    includes: three_flowers_alliance
