name: 提案D：imbue_pure → pulse_pure +1、pulsePending null、spectral -1、weapon power +1
description: |
  Seed an in-raid state with pulsePending set to a fake victory.
  Dispatch imbue_pure → counter ticks, pending clears, spectral
  rebate, weapon power up.
state:
  baseline:
    completedScripts:
      - 000_intro
    weapons:
      ancestor_yaodao:
        power: 6
    characters:
      player:
        stats:
          hp: 30
          mental: 8
          spectral: 25
          intellect: 5
    variables:
      pulse_pure: 0
    currentMapId: kuro_swamp_crossroads
  sengoku-raid:
    metCharacters: []
    companion: null
    companionHp: 0
    pulsePending:
      enemyId: oni_lesser
      absorb: 4
    raid:
      chain: kuro_swamp
      entryMapId: kuro_swamp_edge
      turnsTaken: 2
      pendingLoot: {}
      visited:
        kuro_swamp_crossroads:
          visited: true
          searched: false
          encounter: null
          encounterCleared: true
          pendingLoot: {}
inputs:
  - type: doActivity
    id: imbue:pure
  - type: next
assertions:
  - kind: state
    path: baseline.variables.pulse_pure
    eq: 1
  - kind: state
    path: sengoku-raid.pulsePending
    eq: null
  - kind: state
    path: baseline.weapons.ancestor_yaodao.power
    eq: 7
  - kind: state
    path: baseline.characters.player.stats.spectral
    eq: 24
