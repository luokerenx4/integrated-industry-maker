name: bond_kagari_01 在 affection 不足时显示且 lockedReason 含 affection.kagari
description: |
  After meeting kagari (intro + encounter_kagari_first complete), but
  before giving any gifts, bond_kagari_01 should appear in the hub
  with available=false and lockedReason naming the affection gap.
  This validates the WU1 plumbing: evaluateCondition returns a
  structured reason and raid.ts surfaces it on bond_* scripts.
state:
  baseline:
    completedScripts:
      - 000_intro
      - encounter_kagari_first
    characters:
      kagari:
        affection: 1
        custom: {}
  sengoku-raid:
    raid: null
    metCharacters:
      - kagari
inputs: []
assertions:
  - kind: activity
    id: script:bond_kagari_01
    available: false
    lockedReasonIncludes: affection.kagari
