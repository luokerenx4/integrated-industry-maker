name: move 选项 title 在目标 zone 是 extract 时标"撤退可"
description: |
  At bridge_foot (sumida spawn), move:ferry_landing's title should include
  "撤退可" because ferry_landing.isExtract=true. The reed_marsh adjacent
  has no extract, so its move title stays plain.
state:
  baseline:
    completedScripts:
      - 000_intro
  sengoku-raid:
    raid: null
maxSteps: 20
inputs:
  - type: doActivity
    id: depart:sumida_river
  - type: next
assertions:
  - kind: activity
    id: move:sumida_river_ferry_landing
    titleIncludes: 撤退可
  - kind: activity
    id: move:sumida_river_reed_marsh
    titleIncludes: 葦の藪
